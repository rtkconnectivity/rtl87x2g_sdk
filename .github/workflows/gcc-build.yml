name: GCC Build ADC
run-name: GCC Build ADC
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Install GCC toolchain
          run: |
            sudo apt-get update
            sudo apt-get install -y build-essential gcc g++

        - name: Build adc project
          working-directory: samples\peripheral\adc\continuous_gdma\proj\rtl87x2g\gcc
          run: |
            make clean
            make
